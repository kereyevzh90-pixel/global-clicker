<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Глобальный кликер</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="onlineIndicator" class="online-indicator">🟢 Онлайн: 0 чел.</div>

  <div class="container">
    <h1>Глобальный кликер</h1>
    <div id="counter" class="counter">0</div>
    <div id="personalContribution" class="personal-contribution">Ваш вклад: 0 кликов</div>

    <input
      id="nicknameInput"
      class="nickname-input"
      type="text"
      placeholder="Ваш никнейм"
      maxlength="20"
    />
    <div id="nicknameError" class="nickname-error"></div>

    <div class="button-wrapper">
      <button id="clickButton" class="click-button">Кликни меня!</button>
    </div>
    <div id="title" class="title"></div>

    <div class="shop">
      <h2>🛒 Магазин улучшений</h2>
      <button id="toggleAutoClick" class="autoclick-toggle">⏸ Поставить автокликер на паузу</button>
      <div class="upgrade" data-upgrade-id="1">
        <div class="upgrade-info">
          <div class="upgrade-name">Автокликер I — +1 клик/сек</div>
          <div class="upgrade-owned" id="owned-1">У вас: 0</div>
        </div>
        <button class="upgrade-buy" id="buy-1">Купить за 50</button>
      </div>
      <div class="upgrade" data-upgrade-id="2">
        <div class="upgrade-info">
          <div class="upgrade-name">Автокликер II — +10 кликов/сек</div>
          <div class="upgrade-owned" id="owned-2">У вас: 0</div>
        </div>
        <button class="upgrade-buy" id="buy-2">Купить за 3 000</button>
      </div>
      <div class="upgrade" data-upgrade-id="3">
        <div class="upgrade-info">
          <div class="upgrade-name">Автокликер III — +100 кликов/сек</div>
          <div class="upgrade-owned" id="owned-3">У вас: 0</div>
        </div>
        <button class="upgrade-buy" id="buy-3">Купить за 100 000</button>
      </div>
    </div>

    <div class="leaderboard">
      <h2>🏆 Топ кликеров</h2>
      <ol id="leaderboardList"></ol>
    </div>
  </div>

  <div id="gameOverOverlay" class="game-over-overlay">
    <div class="game-over-text">ИГРА ПРОЙДЕНА!<br />Вы сломали счётчик!</div>
  </div>

  <script src="script.js"></script>
</body>
</html>
